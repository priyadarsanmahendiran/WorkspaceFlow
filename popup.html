<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkspaceFlow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #ea6666 0%, #4b9ea2 100%);
      color: white;
    }

    .header {
      padding: 20px;
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.8;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.05);
    }

    .stat {
      text-align: center;
      padding: 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      backdrop-filter: blur(5px);
    }

    .stat-value {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 3px;
    }

    .stat-label {
      font-size: 10px;
      opacity: 0.8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .section {
      padding: 15px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.2s ease;
      backdrop-filter: blur(5px);
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-1px);
    }

    .btn-primary {
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: white;
    }

    .context-list {
      max-height: 250px;
      overflow-y: auto;
    }

    .context-item {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .context-item:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateX(4px);
    }

    .context-item.active {
      background: rgba(255, 255, 255, 0.3);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .context-name {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .context-meta {
      font-size: 11px;
      opacity: 0.8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .context-tabs {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .context-actions {
      display: flex;
      gap: 5px;
    }

    .context-actions button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      opacity: 0.7;
      font-size: 12px;
      padding: 2px 4px;
      border-radius: 3px;
    }

    .context-actions button:hover {
      opacity: 1;
      background: rgba(255, 255, 255, 0.2);
    }

    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }

    .empty-state {
      text-align: center;
      padding: 30px 15px;
      opacity: 0.7;
    }

    .empty-state-icon {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .empty-state-text {
      font-size: 13px;
      line-height: 1.4;
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .tab-count {
      background: rgba(255, 255, 255, 0.3);
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
    }

    .keyboard-shortcut {
      font-size: 10px;
      opacity: 0.6;
      font-family: monospace;
    }

    /* Scrollbar styling */
    .context-list::-webkit-scrollbar {
      width: 4px;
    }

    .context-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }

    .context-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 2px;
    }

    .context-list::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>WorkspaceFlow</h1>
    <p>Smart Tab Management</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="totalTabs">-</div>
      <div class="stat-label">Open Tabs</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="totalContexts">-</div>
      <div class="stat-label">Contexts</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="activeContext">-</div>
      <div class="stat-label">Active</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">
      <span>Workspaces</span>
      <button class="btn" id="saveContextBtn">
        💾 Save Current
      </button>
    </div>

    <div id="contextList" class="context-list">
      <div class="loading">
        <div class="spinner"></div>
      </div>
    </div>

    <div class="quick-actions">
      <button class="btn btn-primary" id="organizeTabsBtn">
        🎯 Auto-Organize
      </button>
      <button class="btn" id="cleanupTabsBtn">
        🧹 Cleanup Tabs
      </button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">
      <span>Quick Actions</span>
      <span class="keyboard-shortcut">Ctrl+Shift+S</span>
    </div>
    <div class="quick-actions">
      <button class="btn" id="suspendTabsBtn">
        ⏸️ Suspend Inactive
      </button>
      <button class="btn" id="exportContextBtn">
        📤 Export Context
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
