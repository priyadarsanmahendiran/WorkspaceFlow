<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkspaceFlow</title>
  <style>
    :root {
      --bg-dark: #0f1115;
      --bg-card: #16181d;
      --bg-hover: #1e2128;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 380px;
      min-height: 520px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      overflow-x: hidden;
    }

    .header {
      padding: 24px 20px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
      background: linear-gradient(135deg, #a5b4fc, #818cf8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 20px;
      background: var(--bg-dark);
    }

    .stat {
      background: var(--bg-card);
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid var(--border);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .section {
      padding: 0 20px 20px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
    }

    .btn:hover {
      background: var(--bg-hover);
      border-color: var(--text-muted);
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .context-list {
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 16px;
    }

    .context-list::-webkit-scrollbar {
      width: 4px;
    }

    .context-list::-webkit-scrollbar-track {
      background: var(--bg-card);
      border-radius: 4px;
    }

    .context-list::-webkit-scrollbar-thumb {
      background: var(--bg-hover);
      border-radius: 4px;
    }

    .context-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .context-item:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .context-item.active {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.1);
    }

    .context-name {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--text-main);
    }

    .context-meta {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .context-tabs {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab-count {
      background: var(--bg-hover);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--text-main);
      font-weight: 500;
    }

    .context-actions {
      display: flex;
      gap: 6px;
    }

    .context-actions button {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: all 0.2s ease;
      font-size: 12px;
    }

    .context-actions button:hover {
      background: var(--bg-hover);
      color: var(--text-main);
    }

    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      cursor: pointer;
      color: var(--text-main);
      transition: all 0.2s ease;
    }

    .icon-btn:hover {
      background: var(--bg-hover);
      transform: translateY(-1px);
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top: 2px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .empty-state {
      text-align: center;
      padding: 30px 15px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .empty-state-text {
      font-size: 12px;
      line-height: 1.5;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <div>
      <h1>WorkspaceFlow</h1>
      <p>Intelligent AI Tab Groups</p>
    </div>
    <button class="icon-btn" id="optionsBtn" title="AI Settings">⚙️</button>
  </div>

  <div class="stats">
    <div class="stat" style="grid-column: span 3;">
      <div class="stat-value" id="totalTabs">-</div>
      <div class="stat-label">Total Active Tabs</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">
      <span>Active Tab Groups</span>
    </div>

    <div id="groupList" class="context-list">
      <div class="loading">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">AI & Quick Actions</div>
    <div class="quick-actions" style="margin-bottom: 10px;">
      <button class="btn btn-primary" id="organizeTabsBtn" style="grid-column: span 2;">
        ✨ Auto-Organize Everything
      </button>
    </div>
    <div class="quick-actions">
      <button class="btn" id="cleanupTabsBtn" style="grid-column: span 2;">🧹 Cleanup</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
